<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B45309"/>
      <stop offset="100%" style="stop-color:#92400E"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78350F"/>
      <stop offset="100%" style="stop-color:#92400E"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#FBBF24;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0.8"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>

  <!-- House body -->
  <rect x="22" y="54" width="56" height="32" rx="2" fill="#FEF3C7"/>

  <!-- Roof shape -->
  <polygon points="50,14 14,54 86,54" fill="url(#roof)"/>

  <!-- Insulation layer (golden strip under roof) -->
  <polygon points="50,22 18,56 82,56 50,22" fill="url(#shine)" opacity="0.85"/>
  <!-- Second insulation stripe -->
  <polygon points="50,29 21,58 79,58 50,29" fill="#FBBF24" opacity="0.5"/>

  <!-- Door -->
  <rect x="41" y="68" width="18" height="18" rx="2" fill="#B45309"/>
  <circle cx="55" cy="78" r="1.5" fill="#FCD34D"/>

  <!-- Left window -->
  <rect x="26" y="60" width="11" height="10" rx="1.5" fill="#BAE6FD" opacity="0.9"/>
  <line x1="31.5" y1="60" x2="31.5" y2="70" stroke="#7DD3FC" strokeWidth="0.8"/>
  <line x1="26" y1="65" x2="37" y2="65" stroke="#7DD3FC" strokeWidth="0.8"/>

  <!-- Right window -->
  <rect x="63" y="60" width="11" height="10" rx="1.5" fill="#BAE6FD" opacity="0.9"/>
  <line x1="68.5" y1="60" x2="68.5" y2="70" stroke="#7DD3FC" strokeWidth="0.8"/>
  <line x1="63" y1="65" x2="74" y2="65" stroke="#7DD3FC" strokeWidth="0.8"/>

  <!-- Heat rays (top right) -->
  <g opacity="0.9">
    <line x1="78" y1="12" x2="84" y2="8" stroke="#FCD34D" strokeWidth="2" strokeLinecap="round"/>
    <line x1="82" y1="18" x2="90" y2="17" stroke="#FCD34D" strokeWidth="2" strokeLinecap="round"/>
    <line x1="80" y1="25" x2="87" y2="27" stroke="#FCD34D" strokeWidth="1.5" strokeLinecap="round"/>
  </g>

  <!-- Circle border -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#78350F" strokeWidth="1.5"/>
</svg>
